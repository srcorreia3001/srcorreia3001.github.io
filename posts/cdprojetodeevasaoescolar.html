    <style>/* Definição das cores do seu blog */
:root {
    --azul-fundo: #0a192f;
    --azul-brilhante: #3a86ff;
    --azul-botao: #0d6efd;
    --branco: #ffffff;
}

/* Cor do fundo do menu */
.navbar {
    background-color: var(--azul-fundo) !important;
    border-bottom: 2px solid var(--azul-botao);
}

/* Cor do nome TIAGO CORREIA (Logo) */
.navbar-brand {
    color: var(--azul-brilhante) !important;
    font-weight: bold;
}

/* Cor dos links do menu */
.nav-link {
    color: var(--branco) !important;
    transition: 0.3s;
}

.nav-link:hover {
    color: var(--azul-brilhante) !important;
}

/* Destaque especial do item Portfólio */
/* Destaque Amarelo para o item Portfólio */
#menu-portfolio {
    color: #ffca28 !important; /* Amarelo Vibrante */
    border: 2px solid #ffca28 !important;
    border-radius: 5px;
    font-weight: bold;
    transition: all 0.3s ease;
    padding: 5px 15px !important;
}

/* Efeito ao passar o mouse */
#menu-portfolio:hover {
    background-color: #ffca28 !important;
    color: #0a192f !important; /* Texto azul escuro quando fundo for amarelo */
    transform: scale(1.1);
    box-shadow: 0 0 15px rgba(255, 202, 40, 0.5);
}



/*  FIM DAS DEFINIÇOES DO MENU*/


/* Ajuste Geral do Carrossel */
.carousel-item {
    height: 60vh; /* Ocupa 60% da altura da tela */
    min-height: 350px;
    background-color: #0a192f; /* Fundo reserva se a imagem falhar */
}

.banner-img {
    height: 100%;
    object-fit: cover;
    filter: brightness(40%); /* Escurece a imagem para o texto aparecer */
}

/* Ajuste da Legenda (Texto sobre a imagem) */
.carousel-caption {
    bottom: 10% !important; /* Sobe um pouco o texto */
    background: rgba(10, 25, 47, 0.8); /* Fundo azul escuro semi-transparente */
    padding: 15px;
    border-radius: 10px;
    border: 1px solid var(--azul-brilhante);
}

/* Correção para Celular e Tablet */
@media (max-width: 768px) {
    .carousel-caption {
        position: relative !important; /* Faz o texto ficar abaixo da imagem se a tela for pequena */
        bottom: 0 !important;
        left: 0 !important;
        right: 0 !important;
        background: #0a192f;
        margin-top: -5px;
    }

    .carousel-item {
        height: auto; /* Deixa o carrossel crescer conforme o texto */
    }
}

/* Garante que a legenda apareça bem no celular */
@media (max-width: 767px) {
    .carousel-caption {
        background: rgba(10, 25, 47, 0.85) !important; /* Fundo mais sólido para leitura */
        bottom: 5% !important; /* Posiciona mais abaixo */
        padding: 10px !important;
    }

    .carousel-caption h2 {
        font-size: 1.1rem !important; /* Diminui o título no celular */
    }

    .carousel-caption p {
        font-size: 0.8rem !important; /* Diminui a descrição no celular */
        margin-bottom: 10px;
    }

    .carousel-caption .btn {
        padding: 5px 15px !important;
        font-size: 0.8rem !important; /* Botão menor para caber na tela */
    }
}



/*FIM DAS DEFINIÇOES DO CARROCEL */




/* Estilo dos Cards da Grade */
.bg-dark-blue {
    background-color: #0a192f !important;
}

.border-blue {
    border: 1px solid #0d6efd !important;
    transition: transform 0.3s ease, border-color 0.3s ease;
}

.border-blue:hover {
    transform: translateY(-5px);
    border-color: #3a86ff !important;
}

.post-card img {
    height: 180px;
    object-fit: cover;
}

.text-blue-logo {
    color: #3a86ff !important;
    text-transform: uppercase;
    font-size: 1.2rem;
    letter-spacing: 2px;
}



/* Estilo do Botão Ver Projeto */
.btn-ver-mais {
    background-color: transparent;
    color: #3a86ff !important;
    border: 2px solid #3a86ff;
    font-weight: bold;
    text-transform: uppercase;
    transition: all 0.4s ease;
    border-radius: 5px;
    padding: 10px;
    text-align: center;
}

.btn-ver-mais:hover {
    background-color: #3a86ff;
    color: #ffffff !important;
    box-shadow: 0 5px 15px rgba(58, 134, 255, 0.4);
    transform: translateY(-3px);
}

/* Alinhamento dos botões */
.card-body {
    min-height: 200px; /* Garante um espaço mínimo para o conteúdo */
}




/* FIM DAS DEFINIÇOES DO GRID */


/* Estilo Reforçado da Frase da Semana */
.frase-da-semana {
    background-color: #0a192f !important; /* Azul Escuro Profundo */
    background: linear-gradient(145deg, #0a192f, #112240) !important;
    border: 2px solid #3a86ff !important; /* Borda Azul Brilhante */
    border-radius: 15px;
    padding: 30px;
}

.frase-texto-estilo {
    color: #ffffff !important; /* Força a letra a ser branca sobre o fundo escuro */
    font-size: 1.25rem;

}

/* Ajuste para o texto não sumir no Mobile/Tablet */
@media (max-width: 768px) {
    .frase-da-semana {
        margin: 10px;
        padding: 20px;
    }
    .frase-texto-estilo {

    }
}

/* FIM DAS CONFIGURAÇOES PARA A FRASE DE MOTIVAÇÃO */


/* Estilo da Seção de Contato */

}

<script>
    const frasesDeDados = [
        { texto: "Em Deus nós confiamos; todos os outros devem trazer dados.", autor: "W. Edwards Deming" },
        { texto: "Torture os dados o suficiente e eles confessarão qualquer coisa.", autor: "Ronald Coase" },
        { texto: "O objetivo é transformar dados em informação, e informação em insights.", autor: "Carly Fiorina" },
        { texto: "Dados são o novo petróleo, mas o SQL é a refinaria que gera valor.", autor: "Especialista em Dados" },
        { texto: "A simplicidade é o último grau de sofisticação no código Python.", autor: "Adaptado de Da Vinci" },
        { texto: "Sem dados, você é apenas mais uma pessoa com uma opinião.", autor: "W. Edwards Deming" },
        { texto: "O aprendizado de máquina é a ciência de fazer os computadores agirem sem serem explicitamente programados.", autor: "Andrew Ng" }
    ];

    function mudarFrase() {
        // Escolhe uma frase aleatória da lista
        const indiceAleatorio = Math.floor(Math.random() * frasesDeDados.length);
        const selecao = frasesDeDados[indiceAleatorio];

        // Atualiza o HTML com a frase escolhida
        document.getElementById('texto-frase').innerText = `"${selecao.texto}"`;
        document.getElementById('autor-frase').innerText = selecao.autor;
    }

    // Executa a função assim que a página carrega
    window.onload = mudarFrase;


// Atualiza o ano no rodapé automaticamente
document.getElementById('ano-atual').textContent = new Date().getFullYear();

</script>
